name: Release Obsidian plugin

# Cut a release by pushing a tag that exactly matches the manifest version
# (e.g. `git tag 0.1.0 && git push origin 0.1.0`). Obsidian + BRAT require the
# tag to equal the version with no leading "v".
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches manifest version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          manifest_version="$(node -p "require('./manifest.json').version")"
          if [ "$tag" != "$manifest_version" ]; then
            echo "::error::Tag '$tag' does not match manifest version '$manifest_version'."
            exit 1
          fi

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Create release with plugin assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          # Obsidian/BRAT require manifest.json + main.js as individual assets
          # (never zipped). styles.css is included only if the plugin ships one.
          assets="manifest.json main.js"
          [ -f styles.css ] && assets="$assets styles.css"
          gh release create "$tag" \
            --title "$tag" \
            --notes "Release $tag" \
            $assets
